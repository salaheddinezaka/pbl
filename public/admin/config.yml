# Decap CMS — no secrets here.
# Production: Netlify Identity + Git Gateway. Enable both in
# Netlify → Project configuration → Identity, then invite admins.
# See deploy.md § 9 for the full procedure.
# Local: temporarily set local_backend: true under `backend` below (do not commit).
backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

local_backend: false

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: pages
    label: Pages
    folder: src/content/pages
    extension: yaml
    format: yaml
    create: true
    identifier_field: title
    # List + search: plain text (not a link). Global search scans file bodies, including urlPath in YAML.
    summary: "{{title}} — {{urlPath}}"
    fields:
      - label: Title
        name: title
        widget: string
      - label: URL Path
        name: urlPath
        widget: siteUrlPath
        hint: "e.g. clients/preview/twc/vsg-listicle or / — link below opens in a new tab."
      - label: HTML Content
        name: htmlContent
        widget: text
        hint: Full HTML body; paste including script tags if needed.
      - label: Head HTML (optional)
        name: headHtml
        widget: text
        required: false
        hint: Raw HTML for head — link, script, meta, style, etc.
      - label: Email Protected
        name: isProtected
        widget: boolean
        default: false
      - label: Allowed Emails
        name: allowedEmails
        widget: list
        required: false
        hint: "Required when Email Protected is on — addresses that may open this URL (plus Netlify Identity if enabled)."
        field:
          label: Email
          name: email
          widget: string
