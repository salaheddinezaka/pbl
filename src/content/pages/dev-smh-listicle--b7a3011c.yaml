                <h3 class="disclosure-section__title">Advertiser Disclosure</h3>
                <p>FinanceBuzz is an independent, advertising-supported website. We receive compensation from third-party advertisers for products and services mentioned on this site.</p>
                <p>FinanceBuzz does not include all financial or credit offers that may be available to you. Information is accurate as of the publishing date.</p>
                <p>The credit card offers that appear on this site are from companies from which FinanceBuzz receives compensation such as banks or CardRatings.com.</p>
              </div>
              
              <div class="disclosure-section">
                <h3 class="disclosure-section__title">Editorial Policy</h3>
                <p>The FinanceBuzz editorial team strives to provide accurate, in-depth information and reviews to help you, our reader, make financial decisions with confidence. Here's what you can expect from us:</p>
              </div>
              
              <button class="disclosure-modal__close-btn">Close</button>
            </div>
          </div>
          <script>
            const disclosureLink = document.getElementById('disclosure-link');
            const disclosureModal = document.getElementById('disclosure-modal');
            const closeDisclosureModal = document.getElementById('close-disclosure-modal');
            const closeDisclosureBtn = document.querySelector('.disclosure-modal__close-btn');
  
            disclosureLink.addEventListener('click', function(e) {
              e.preventDefault();
              disclosureModal.style.display = 'flex';
            });
  
            closeDisclosureModal.addEventListener('click', function() {
              disclosureModal.style.display = 'none';
            });
  
            closeDisclosureBtn.addEventListener('click', function() {
              disclosureModal.style.display = 'none';
            });
  
            // Optional: close modal when clicking outside the modal content
            disclosureModal.addEventListener('click', function(e) {
              if (e.target === disclosureModal) {
                disclosureModal.style.display = 'none';
              }
            });
          </script>
