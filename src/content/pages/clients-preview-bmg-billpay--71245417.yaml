title: 'BullDog Media BillPay Preview'
urlPath: 'clients/preview/bmg/billpay'
htmlContent: |-
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:wght@400&display=swap');
  @import url('https://fonts.cdnfonts.com/css/sofia-pro');
  
  :root {
    /* Base styles */
    --font-family: 'Open Sans', sans-serif;
    --font-family-lora: 'Lora', 'Times New Roman', serif;
    --font-family-sofia: 'Sofia Pro', sans-serif;
    --font-family-roboto: 'Roboto', sans-serif;
  }
  
  *,
  *::before,
  *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  
  /* Mobile first styles - as per original spec */
  .lincx__container {
    display: flex;
    flex-direction: column;
    width: 100%;
    margin: 0 auto;
  }
  
  .offer {
    padding: 1.5rem;
    border: 1px solid #E2E8F0;
    border-radius: 20px;
    min-height: 535px;
    display: none;
    flex-direction: column;
    width: 100%;
  }
  
  .offer.active {
    display: flex;
  }
  
  .offer__header {
    font-family: var(--font-family-sofia);
    font-weight: 700;
    font-size: 1rem;
    color: #226BE2;
  }
  
  .offer__subheader {
    font-family: var(--font-family-sofia);
    font-weight: 600;
    font-size: 1.35rem;
    color: #2D3748;
    margin: 1rem 0;
  }
  
  .offer__benefits {
    width: 100%;
  }
  
  .offer__benefits ul {
    list-style-type: none;
    padding: 0;
  }
  
  .offer__benefits li {
    font-family: var(--font-family-roboto);
    font-weight: 400;
    font-size: 0.875rem;
    color: #1A202C;
    margin-bottom: 0.75rem;
  }
  
  .offer__ctas {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    width: 100%;
    margin: 1.5rem 0;
  }
  
  .offer__ctas__next,
  .offer__ctas__decline {
    width: 100%;
  }
  
  .cta__button {
    border-radius: 5px;
    padding: 0.65rem;
    font-family: var(--font-family-sofia);
    font-weight: 600;
    font-size: 1.125rem;
    color: #FFFFFF;
    text-decoration: none;
    border: none;
    cursor: pointer;
    display: block;
    width: 100%;
    text-align: center;
  }
  
  .offer__ctas__next .cta__button {
    background-color: #226BE2;
  }
  
  .offer__ctas__decline .cta__button {
    background-color: #077443;
  }
  
  .offer__disclosue {
    padding: 0.5rem 1rem;
    border-radius: 0;
    font-family: var(--font-family-roboto);
    font-weight: 400;
    font-size: 0.875rem;
    color: #1A202C;
    width: 100%;
  }
  
  [data-content=''] {
    display: none !important;
  }
  
  /* Tablet styles */
  @media screen and (min-width: 768px) {
    .lincx__container {
      padding: 2rem;
    }
  
    .offer {
      padding: 2rem;
      border-radius: 25px;
      min-height: 600px;
    }
  
    .offer__header {
      font-size: 1.125rem;
    }
  
    .offer__subheader {
      font-size: 1.5rem;
    }
  
    .offer__benefits li {
      font-size: 1rem;
      margin-bottom: 1rem;
    }
  
    .offer__ctas {
      flex-direction: row;
      justify-content: center;
      gap: 2rem;
      margin: 2rem 0;
    }
  
    .offer__ctas__next,
    .offer__ctas__decline {
      width: auto;
      min-width: 250px;
    }
  
    .cta__button {
      font-size: 1.25rem;
      padding: 0.75rem;
    }
  
    .offer__disclosue {
      max-width: 80%;
      margin: 0 auto;
      font-size: 0.9375rem;
    }
  }
  
  /* Desktop styles */
  @media screen and (min-width: 1024px) {
    .lincx__container {
      max-width: 1200px;
      padding: 2.5rem;
    }
  
    .offer {
      padding: 2.5rem;
      border-radius: 30px;
      min-height: 700px;
    }
  
    .offer__header {
      font-size: 1.25rem;
    }
  
    .offer__subheader {
      font-size: 1.75rem;
      margin: 1.5rem 0;
    }
  
    .offer__benefits {
      max-width: 80%;
      margin: 0 auto;
    }
  
    .offer__benefits li {
      font-size: 1.125rem;
      margin-bottom: 1.25rem;
    }
  
    .offer__ctas {
      gap: 3rem;
      margin: 2.5rem 0;
    }
  
    .offer__ctas__next,
    .offer__ctas__decline {
      min-width: 300px;
    }
  
    .cta__button {
      font-size: 1.35rem;
      padding: 0.85rem;
    }
  
    .offer__disclosue {
      max-width: 70%;
      font-size: 1rem;
      padding: 0.75rem 1.5rem;
    }
  }
  
  </style>
  <script
        src="https://api.lincx.com/load"
        data-zone-id="cc5x46"
        data-test-mode
      ></script>
isProtected: false
