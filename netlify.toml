# Protected routes: set ACCESS_COOKIE_SECRET in Netlify env (see README).
# Optional: IDENTITY_JWT_SECRET + PUBLIC_NETLIFY_IDENTITY_URL for Netlify Identity.
#
# Decap GitHub backend: in Netlify → Site configuration → Access & security → OAuth,
# enable the GitHub provider (Client ID + secret from a GitHub OAuth App:
# callback URL https://api.netlify.com/auth/done). See https://decapcms.org/docs/github-backend/
# Astro SSR: use framework defaults for publish/output; do not force static-only publish roots.

[build]
  command = "npm run build"

[build.environment]
  # Matches package.json engines (>=22.12.0)
  NODE_VERSION = "22"

[[redirects]]
  from = "/keystatic"
  to = "/admin"
  status = 301

[[redirects]]
  from = "/keystatic/*"
  to = "/admin"
  status = 301
